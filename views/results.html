<!-- Results View -->
<section id="view-results" class="view hidden" aria-label="推荐结果">
  <header class="results-header">
    <button id="btn-back-entry" class="btn btn-icon" aria-label="返回">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="results-brand">
      <span class="brand-mini-icon">🌿</span>
      <span class="brand-mini-name">顺时裳</span>
    </div>
    <button id="btn-profile" class="btn-profile-corner" aria-label="我的画像" title="我的画像">
      <span class="profile-icon">👤</span>
    </button>
  </header>
  
  <!-- Page Title Section -->
  <div class="results-page-title">
    <h2 class="page-title">今日穿搭推荐</h2>
    <p class="page-subtitle" id="results-subtitle">根据雨水节气，为您精选 3 套五行搭配</p>
  </div>
  
  <!-- Skeleton Loading Screen -->
  <div id="results-skeleton" class="results-skeleton">
    <!-- Header Skeleton -->
    <div class="skeleton-header">
      <div class="skeleton-circle small"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-circle small"></div>
    </div>
    
    <!-- Title Skeleton -->
    <div class="skeleton-title-section">
      <div class="skeleton-line title"></div>
      <div class="skeleton-line subtitle"></div>
    </div>
    
    <!-- Fortune Card Skeleton -->
    <div class="skeleton-fortune-card">
      <div class="skeleton-fortune-header">
        <div class="skeleton-circle"></div>
        <div class="skeleton-line short"></div>
      </div>
      <div class="skeleton-fortune-content">
        <div class="skeleton-line"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line long"></div>
      </div>
    </div>
    
    <!-- Scheme Cards Skeleton x3 -->
    <div class="skeleton-schemes">
      <div class="skeleton-scheme-card">
        <div class="skeleton-color-bar"></div>
        <div class="skeleton-scheme-content">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-tags">
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
          </div>
        </div>
      </div>
      <div class="skeleton-scheme-card">
        <div class="skeleton-color-bar"></div>
        <div class="skeleton-scheme-content">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-tags">
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
          </div>
        </div>
      </div>
      <div class="skeleton-scheme-card">
        <div class="skeleton-color-bar"></div>
        <div class="skeleton-scheme-content">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
          <div class="skeleton-tags">
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
            <div class="skeleton-tag"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Actions Skeleton -->
    <div class="skeleton-actions">
      <div class="skeleton-button"></div>
      <div class="skeleton-button primary"></div>
    </div>
  </div>
  
  <div class="results-body hidden" id="results-content">
    <!-- 八字使用状态提示 -->
    <div id="bazi-usage-hint" class="bazi-usage-hint hidden">
      <div class="usage-hint-content">
        <span class="usage-icon">📿</span>
        <span class="usage-text">已基于您的八字喜用进行个性化推荐</span>
      </div>
    </div>
    <div id="bazi-missing-hint" class="bazi-missing-hint hidden">
      <div class="usage-hint-content">
        <span class="usage-icon">💡</span>
        <span class="usage-text">完善八字信息，推荐精准度可提升 30%</span>
        <button class="usage-btn" id="btn-go-profile" type="button">去填写</button>
      </div>
    </div>
    
    <!-- Daily Fortune Card -->
    <div id="daily-fortune-container" class="daily-fortune-card">
      <div class="fortune-header">
        <span class="fortune-icon">🔮</span>
        <span class="fortune-title">今日穿搭运势</span>
      </div>
      <div class="fortune-meta">
        <span class="fortune-scene" id="fortune-scene"></span>
        <span class="fortune-wish" id="fortune-wish"></span>
      </div>
      <div class="fortune-colors" id="fortune-colors"></div>
      <div class="fortune-analysis" id="fortune-analysis"></div>
      <div class="fortune-tip" id="fortune-tip"></div>
    </div>
    
    <!-- Weather Impact -->
    <div id="weather-impact-container"></div>
    
    <div class="scheme-cards" id="scheme-cards">
      <!-- Cards rendered by JS -->
    </div>
    
    <div class="results-actions">
      <button id="btn-regenerate" class="btn btn-secondary btn-refresh" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        换一批
      </button>
      <button id="btn-upload" class="btn btn-primary btn-upload" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        记录今日穿搭
      </button>
    </div>
  </div>
  
  <!-- Feedback Modal -->
  <div id="feedback-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>为什么不喜欢这套？</h3>
        <button class="modal-close" id="btn-close-feedback" type="button">&times;</button>
      </div>
      <div class="modal-body">
        <div class="feedback-options">
          <button class="feedback-option" data-reason="color" type="button">
            <span class="option-icon">🎨</span>
            <span class="option-text">颜色不喜欢</span>
          </button>
          <button class="feedback-option" data-reason="style" type="button">
            <span class="option-icon">👔</span>
            <span class="option-text">款式不合适</span>
          </button>
          <button class="feedback-option" data-reason="wuxing" type="button">
            <span class="option-icon">☯️</span>
            <span class="option-text">五行不认同</span>
          </button>
          <button class="feedback-option" data-reason="material" type="button">
            <span class="option-icon">🧵</span>
            <span class="option-text">材质不合适</span>
          </button>
          <button class="feedback-option" data-reason="other" type="button">
            <span class="option-icon">🤔</span>
            <span class="option-text">其他原因</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

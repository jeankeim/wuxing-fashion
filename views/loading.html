<!-- Loading View - 五行计算加载页 -->
<div id="view-loading" class="view">
  <div class="loading-container">
    <!-- 五行能量动画 -->
    <div class="wuxing-animation">
      <div class="wuxing-circle" data-element="metal">
        <span class="wuxing-icon">⚪</span>
        <span class="wuxing-name">金</span>
      </div>
      <div class="wuxing-circle" data-element="wood">
        <span class="wuxing-icon">🌿</span>
        <span class="wuxing-name">木</span>
      </div>
      <div class="wuxing-circle" data-element="water">
        <span class="wuxing-icon">💧</span>
        <span class="wuxing-name">水</span>
      </div>
      <div class="wuxing-circle" data-element="fire">
        <span class="wuxing-icon">🔥</span>
        <span class="wuxing-name">火</span>
      </div>
      <div class="wuxing-circle" data-element="earth">
        <span class="wuxing-icon">🟤</span>
        <span class="wuxing-name">土</span>
      </div>
    </div>
    
    <!-- 文案轮播 -->
    <div class="loading-text">
      <p id="loading-message">正在校准五行能量...</p>
    </div>
    
    <!-- 进度条 -->
    <div class="loading-progress">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <span class="progress-text">0%</span>
    </div>
  </div>
</div>

<!-- Upload View - 记录今日穿搭 -->
<section id="view-upload" class="view hidden" aria-label="记录今日穿搭">
  <header class="upload-header">
    <button id="btn-back-results" class="btn btn-icon" aria-label="返回">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <h2>记录今日穿搭</h2>
  </header>
  
  <div class="upload-body">
    <!-- 简洁提示 -->
    <div class="upload-hint-bar">
      <span class="hint-icon">✨</span>
      <span class="hint-text">记录今日穿搭，见证五行之美</span>
    </div>
    
    <!-- 记录表单 -->
    <form id="upload-form" class="upload-form">
      <!-- 日期（自动填充，只读） -->
      <div class="form-group">
        <label class="form-label">记录日期</label>
        <input type="date" id="upload-date" class="form-input" readonly>
        <span class="form-hint">自动记录为今天</span>
      </div>
      
      <!-- 今日心情 -->
      <div class="form-group">
        <label class="form-label">今日心情 <span class="required">*</span></label>
        <div class="mood-selector" id="mood-selector">
          <button type="button" class="mood-btn" data-mood="happy">
            <span class="mood-icon">😊</span>
            <span class="mood-label">开心</span>
          </button>
          <button type="button" class="mood-btn" data-mood="confident">
            <span class="mood-icon">💪</span>
            <span class="mood-label">自信</span>
          </button>
          <button type="button" class="mood-btn" data-mood="calm">
            <span class="mood-icon">😌</span>
            <span class="mood-label">平静</span>
          </button>
          <button type="button" class="mood-btn" data-mood="tired">
            <span class="mood-icon">😴</span>
            <span class="mood-label">疲惫</span>
          </button>
          <button type="button" class="mood-btn" data-mood="excited">
            <span class="mood-icon">🤩</span>
            <span class="mood-label">兴奋</span>
          </button>
        </div>
        <input type="hidden" id="upload-mood" required>
      </div>
      
      <!-- 穿搭颜色 -->
      <div class="form-group">
        <label class="form-label">穿搭颜色</label>
        <input type="text" id="upload-color" class="form-input" placeholder="例如：墨绿色、米白色">
      </div>
      
      <!-- 材质 -->
      <div class="form-group">
        <label class="form-label">材质</label>
        <input type="text" id="upload-material" class="form-input" placeholder="例如：棉麻、丝绸、羊毛">
      </div>
      
      <!-- 穿搭照片 -->
      <div class="form-group">
        <label class="form-label">穿搭照片 <span class="required">*</span></label>
        <div class="photo-upload-zone" id="photo-upload-zone">
          <input type="file" id="upload-photo" accept="image/jpeg,image/png" hidden required>
          <div class="upload-placeholder" id="upload-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <p>点击或拖拽上传图片</p>
            <span class="upload-hint">支持 JPG、PNG，最大 5MB</span>
          </div>
          <div class="photo-preview hidden" id="photo-preview">
            <img id="preview-image" src="" alt="穿搭预览">
            <button type="button" class="btn-remove-photo" id="btn-remove-photo" title="移除照片">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      
      <!-- 穿搭感受 -->
      <div class="form-group">
        <label class="form-label">穿搭感受</label>
        <textarea id="upload-note" class="form-textarea" rows="3" placeholder="记录今日穿搭感受..."></textarea>
      </div>
      
      <!-- 保存按钮 -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-large" id="btn-save-record">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          保存记录
        </button>
      </div>
    </form>
  </div>
</section>

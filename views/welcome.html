<!-- Welcome View -->
<section id="view-welcome" class="view view-welcome" aria-label="欢迎页">
  <!-- 右上角：我的画像 -->
  <button id="btn-profile" class="btn-profile-corner" type="button" title="我的画像">
    <span class="profile-icon">👤</span>
  </button>
  
  <div class="welcome-container">
    <!-- Logo Area -->
    <div class="logo-area">
      <div class="logo-icon">🌿</div>
      <h1 class="app-name">顺时裳</h1>
      <p class="app-name-en">SHUNSHANG</p>
      <p class="slogan">顺时而衣 · 五行养身</p>
    </div>
    
    
    <!-- Solar Term Card -->
    <div class="term-card" id="solar-card">
      <div class="term-icon" id="solar-icon">🌧️</div>
      <div class="term-name" id="solar-term-name">雨水</div>
      <div class="term-info" id="solar-term-desc">第 2 个节气 · 木气生发</div>
      <div class="term-wuxing" id="solar-wuxing">
        <span class="wuxing-tag">木</span>
        <span class="wuxing-hint">宜青绿</span>
      </div>
    </div>
    
    <!-- CTA Button -->
    <button id="btn-start" class="cta-button" type="button">
      开始今日穿搭
    </button>
    
    <!-- Fortune Tips -->
    <div class="fortune-tips">
      今日运势 <span class="stars">★★★★☆</span>
    </div>
  </div>
  
  <!-- 仪式感加载层 -->
  <div id="welcome-loading" class="welcome-loading hidden">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>正在校准五行能量...</p>
    </div>
  </div>
</section>

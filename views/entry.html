<!-- Entry View: Wish + Bazi -->
<section id="view-entry" class="view hidden" aria-label="信息输入">
  <header class="entry-header">
    <button id="btn-back-welcome" class="btn btn-icon" aria-label="返回">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="entry-brand">
      <span class="brand-mini-icon">🌿</span>
      <span class="brand-mini-name">顺时裳</span>
    </div>
    <div class="entry-header-spacer"></div>
  </header>
  
  <!-- Page Title -->
  <div class="entry-page-title">
    <h2 class="page-title">定制你的穿搭</h2>
    <p class="page-subtitle">选择场景和心愿，获取专属五行推荐</p>
  </div>
  
  <div class="entry-body">
    <!-- Weather Widget -->
    <div id="weather-widget-container"></div>
    
    <!-- Scene Selection -->
    <div class="scene-section">
      <p class="section-hint">选择今日场景</p>
      <div class="scene-categories">
        <!-- 常用场景 -->
        <div class="scene-category">
          <span class="category-label">常用</span>
          <div class="scene-tags" role="radiogroup" aria-label="常用场景">
            <button class="scene-tag active" data-scene="daily" type="button">🌿 日常</button>
            <button class="scene-tag" data-scene="work" type="button">💼 职场</button>
            <button class="scene-tag" data-scene="commute" type="button">🚇 通勤</button>
            <button class="scene-tag" data-scene="home" type="button">🏠 居家</button>
          </div>
        </div>
        <!-- 工作场景 -->
        <div class="scene-category">
          <span class="category-label">工作</span>
          <div class="scene-tags" role="radiogroup" aria-label="工作场景">
            <button class="scene-tag" data-scene="interview" type="button">🎤 面试/答辩</button>
            <button class="scene-tag" data-scene="negotiation" type="button">🤝 商务谈判</button>
          </div>
        </div>
        <!-- 情感场景 -->
        <div class="scene-category">
          <span class="category-label">情感</span>
          <div class="scene-tags" role="radiogroup" aria-label="情感场景">
            <button class="scene-tag" data-scene="date" type="button">💕 约会</button>
            <button class="scene-tag" data-scene="blind_date" type="button">🌸 初次见面</button>
            <button class="scene-tag" data-scene="romantic_date" type="button">🍷 浪漫约会</button>
          </div>
        </div>
        <!-- 社交场景 -->
        <div class="scene-category">
          <span class="category-label">社交</span>
          <div class="scene-tags" role="radiogroup" aria-label="社交场景">
            <button class="scene-tag" data-scene="party" type="button">🎉 聚会</button>
            <button class="scene-tag" data-scene="friend_gathering" type="button">🍻 朋友聚餐</button>
            <button class="scene-tag" data-scene="celebration" type="button">🎊 重要庆典</button>
          </div>
        </div>
        <!-- 生活场景 -->
        <div class="scene-category">
          <span class="category-label">生活</span>
          <div class="scene-tags" role="radiogroup" aria-label="生活场景">
            <button class="scene-tag" data-scene="sport" type="button">⚡ 运动</button>
            <button class="scene-tag" data-scene="travel" type="button">✈️ 旅行/户外</button>
            <button class="scene-tag" data-scene="study" type="button">📚 考试/学习</button>
          </div>
        </div>
        <!-- 运势场景 -->
        <div class="scene-category">
          <span class="category-label">运势</span>
          <div class="scene-tags" role="radiogroup" aria-label="运势场景">
            <button class="scene-tag" data-scene="benming" type="button">🧧 本命年化煞</button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Wish Selection -->
    <div class="wish-section">
      <p class="section-hint">选择一个当下的心愿（可选）</p>
      <div class="wish-categories">
        <!-- 事业财运 -->
        <div class="wish-category">
          <span class="category-label">事业财运</span>
          <div class="wish-tags" role="radiogroup" aria-label="事业财运心愿">
            <button class="wish-tag" data-wish="求职" type="button">求职顺利</button>
            <button class="wish-tag" data-wish="升职加薪" type="button">升职加薪</button>
            <button class="wish-tag" data-wish="签单顺利" type="button">签单顺利</button>
            <button class="wish-tag" data-wish="贵人运" type="button">贵人运</button>
            <button class="wish-tag" data-wish="防小人避坑" type="button">防小人避坑</button>
          </div>
        </div>
        <!-- 情感人际 -->
        <div class="wish-category">
          <span class="category-label">情感人际</span>
          <div class="wish-tags" role="radiogroup" aria-label="情感人际心愿">
            <button class="wish-tag" data-wish="桃花朵朵" type="button">桃花朵朵</button>
            <button class="wish-tag" data-wish="家庭和睦" type="button">家庭和睦</button>
            <button class="wish-tag" data-wish="挽回缓和" type="button">挽回缓和</button>
            <button class="wish-tag" data-wish="新朋友缘" type="button">新朋友缘</button>
          </div>
        </div>
        <!-- 身心状态 -->
        <div class="wish-category">
          <span class="category-label">身心状态</span>
          <div class="wish-tags" role="radiogroup" aria-label="身心状态心愿">
            <button class="wish-tag" data-wish="精力充沛" type="button">精力充沛</button>
            <button class="wish-tag" data-wish="安神助眠" type="button">安神助眠</button>
            <button class="wish-tag" data-wish="增强自信" type="button">增强自信</button>
            <button class="wish-tag" data-wish="静心专注" type="button">静心专注</button>
          </div>
        </div>
        <!-- 健康平安 -->
        <div class="wish-category">
          <span class="category-label">健康平安</span>
          <div class="wish-tags" role="radiogroup" aria-label="健康平安心愿">
            <button class="wish-tag" data-wish="健康舒畅" type="button">健康舒畅</button>
            <button class="wish-tag" data-wish="身体康复" type="button">身体康复</button>
            <button class="wish-tag" data-wish="出行平安" type="button">出行平安</button>
            <button class="wish-tag" data-wish="远行顺利" type="button">远行顺利</button>
          </div>
        </div>
      </div>
    </div>
    
    <button id="btn-generate" class="btn btn-generate" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      生成今日穿搭
    </button>
  </div>
</section>

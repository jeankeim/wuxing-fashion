<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>五行穿搭建议</title>
  <meta name="description" content="基于节气与五行的个性化穿搭建议">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  
  <!-- Fonts - 使用系统字体，避免 CDN 延迟 -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }
  </style>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
  
  <!-- GitHub Pages SPA 路由处理 -->
  <script>
    (function() {
      // 处理从 404.html 重定向过来的路径
      var params = new URLSearchParams(window.location.search);
      var path = params.get('path');
      if (path) {
        // 移除查询参数，使用 history API 恢复路径
        var newUrl = window.location.pathname + '#' + path;
        window.history.replaceState(null, '', newUrl);
      }
    })();
  </script>
</head>
<body>
  <div class="app-container">
    <!-- Views will be loaded dynamically by app.js -->
  </div>
  
  <!-- Detail Modal (Global) -->
  <div id="modal-detail" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-detail-title">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <header class="modal-header">
        <h3 id="modal-detail-title">穿搭详解</h3>
        <button class="btn btn-icon modal-close" aria-label="关闭">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </header>
      <div class="modal-body" id="modal-detail-body">
        <!-- Content rendered by JS -->
      </div>
    </div>
  </div>
  
  <!-- Disclaimer -->
  <footer class="disclaimer-bar">
    <p>本应用仅供娱乐参考，穿搭建议基于传统文化理念，不构成任何专业建议。</p>
  </footer>
  
  <!-- Privacy Badge -->
  <div class="privacy-badge" title="所有数据仅存储在您的设备上">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    <span>本地存储</span>
  </div>
  
  <!-- Lunar JavaScript Library -->
  <script src="./js/lib/lunar.js"></script>
  
  <!-- App Script (MVC Architecture) -->
  <script type="module">
    import { bootstrap } from './js/core/app.js';
    console.log('[Index] Starting bootstrap...');
    bootstrap();
    console.log('[Index] Bootstrap called');
  </script>
  
  <!-- Service Worker Registration - 延迟注册避免阻塞 -->
  <script>
    if ('serviceWorker' in navigator) {
      // 延迟5秒注册，避免阻塞首屏加载
      setTimeout(() => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('[SW] Registered:', registration.scope);
          })
          .catch((error) => {
            console.error('[SW] Registration failed:', error);
          });
      }, 5000);
    }
  </script>
</body>
</html>
